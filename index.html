<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Aerospace Decision Tool</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #0f172a;
      color: white;
    }

    h1 {
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input[type=range] {
      width: 100%;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    .chart-container {
      position: relative;
      height: 400px;
      max-height: 60vh;
      width: 100%;
      margin-top: 20px;
    }

    canvas {
      max-height: 100% !important;
    }
  </style>
</head>

<body>

<h1>AI Aerospace Decision Tool</h1>

<div class="controls">
  <label>Impact Weight <input type="range" id="impact" min="0" max="1" step="0.1" value="0.5"></label>
  <label>Risk Weight <input type="range" id="risk" min="0" max="1" step="0.1" value="0.3"></label>
  <label>Complexity Weight <input type="range" id="complexity" min="0" max="1" step="0.1" value="0.3"></label>
  <label>Feasibility Weight <input type="range" id="feasibility" min="0" max="1" step="0.1" value="0.4"></label>
  <label>Cost Weight <input type="range" id="cost" min="0" max="1" step="0.1" value="0.3"></label>
  <label>Data Weight <input type="range" id="data" min="0" max="1" step="0.1" value="0.5"></label>
</div>

<table id="table">
  <thead>
    <tr>
      <th>Project</th>
      <th>Score</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>

<script>
const projects = [
  {name:"NASA – Mission Planning AI", impact:9, risk:4, complexity:7, feasibility:8, cost:6, data:7},
  {name:"Airbus – Predictive Maintenance", impact:8, risk:3, complexity:6, feasibility:9, cost:5, data:8},
  {name:"SpaceX – Autonomous Navigation", impact:9, risk:5, complexity:8, feasibility:7, cost:7, data:6},
  {name:"Boeing – Fault Detection AI", impact:8, risk:4, complexity:6, feasibility:8, cost:6, data:7},
  {name:"Planet Labs – Satellite Analysis", impact:7, risk:3, complexity:5, feasibility:9, cost:4, data:9}
];

let chart;

function calculateScores() {
  const w = {
    impact: parseFloat(document.getElementById("impact").value),
    risk: parseFloat(document.getElementById("risk").value),
    complexity: parseFloat(document.getElementById("complexity").value),
    feasibility: parseFloat(document.getElementById("feasibility").value),
    cost: parseFloat(document.getElementById("cost").value),
    data: parseFloat(document.getElementById("data").value)
  };

  return projects.map(p => {
    const score =
      (p.impact * w.impact) -
      (p.risk * w.risk) -
      (p.complexity * w.complexity) +
      (p.feasibility * w.feasibility) -
      (p.cost * w.cost) +
      (p.data * w.data);

    return { name: p.name, score: score.toFixed(2) };
  }).sort((a,b) => b.score - a.score);
}

function updateUI() {
  const data = calculateScores();

  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";
  data.forEach(d => {
    tbody.innerHTML += `<tr><td>${d.name}</td><td>${d.score}</td></tr>`;
  });

  const labels = data.map(d => d.name);
  const scores = data.map(d => d.score);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Score",
        data: scores
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y'
    }
  });
}

document.querySelectorAll("input").forEach(i => {
  i.addEventListener("input", updateUI);
});

updateUI();
</script>

</body>
</html>
